# stac-fastapi-pgstac — the logbook API. Bare install, reachable in-cluster at http://stac-api.
# Reads/writes pgSTAC; CORS defaults to "*" (fine for the local demo, lets stac-browser call it).
# The Transactions extension is enabled (see ENABLE_TRANSACTIONS_EXTENSIONS below) so the pipeline
# can WRITE — without it the API is read-only and the logbook could never be populated.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stac-api
  namespace: eo
  labels:
    app: stac-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stac-api
  template:
    metadata:
      labels:
        app: stac-api
    spec:
      containers:
        - name: stac-api
          image: ghcr.io/stac-utils/stac-fastapi-pgstac@sha256:db117b91302f7983ce4e07658768a6e8d2f6716613252a15f5dcdbda8dae9883
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pgstac-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASS
              valueFrom:
                secretKeyRef:
                  name: pgstac-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DBNAME
              valueFrom:
                secretKeyRef:
                  name: pgstac-credentials
                  key: POSTGRES_DB
            - name: POSTGRES_HOST_READER
              value: pgstac
            - name: POSTGRES_HOST_WRITER
              value: pgstac
            - name: POSTGRES_PORT
              value: "5432"
            # Enable writes (POST/PUT collections + items). Read-only without it -> every write 405s.
            - name: ENABLE_TRANSACTIONS_EXTENSIONS
              value: "TRUE"
            - name: APP_HOST
              value: "0.0.0.0"
            # The image's launcher serves on 8080 regardless of APP_PORT; match it.
            - name: APP_PORT
              value: "8080"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /_mgmt/ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_mgmt/ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: stac-api
  namespace: eo
  labels:
    app: stac-api
spec:
  selector:
    app: stac-api
  ports:
    - name: http
      port: 80
      targetPort: http
