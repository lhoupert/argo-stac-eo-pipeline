# Bootstrap the asset bucket once MinIO is up. Idempotent (--ignore-existing), so re-applying is
# safe. mc image pinned by digest.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-bootstrap
  namespace: eo
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: minio-bucket-bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
          envFrom:
            - secretRef:
                name: minio-credentials
          command: ["sh", "-c"]
          args:
            - |
              set -e
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio..."; sleep 2
              done
              mc mb --ignore-existing local/eo-assets
              mc ls local
