# MinIO — the S3-compatible object store, a single-container Deployment (plain manifest, core
# profile). Storage is emptyDir: ephemeral on purpose for the local demo; the prod profile swaps
# in a PVC. Image pinned by digest.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: eo
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            # Server-wide wildcard CORS so stac-browser (localhost:8082) can GET thumbnails
            # from MinIO (localhost:9100). Replaces per-bucket `mc cors set` which broke when
            # mc/minio versions diverged (mc sends a checksum header the CORS endpoint rejects).
            - name: MINIO_API_CORS_ALLOW_ORIGIN
              value: "*"
          envFrom:
            - secretRef:
                name: minio-credentials
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
