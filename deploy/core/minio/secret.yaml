# Demo credentials — the K8s Secret pattern people will ask about (SPEC §Secrets). These are the
# well-known MinIO defaults, fine for a fully-local sink; a real deployment supplies its own.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: eo
type: Opaque
stringData:
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
